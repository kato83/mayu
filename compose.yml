services:
  postgres:
    image: postgres:17-alpine
    container_name: mayu-postgres
    environment:
      POSTGRES_USER: mayu
      POSTGRES_PASSWORD: mayu
      POSTGRES_DB: mayu
    ports:
      - "5432:5432"
    volumes:
      - mayu-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mayu"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mayu-pgdata:
