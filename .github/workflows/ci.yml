name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mayu
          POSTGRES_PASSWORD: mayu
          POSTGRES_DB: mayu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mayu"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install migrate CLI
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1

      - name: Run migrations
        run: |
          migrate -database "postgres://mayu:mayu@localhost:5432/mayu?sslmode=disable" -path migrations up

      - name: Run unit tests
        run: go test ./... -v -count=1

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://mayu:mayu@localhost:5432/mayu?sslmode=disable
        run: go test ./... -v -count=1 -tags=integration -p 1

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Verify binary
        run: ./bin/mayu version
