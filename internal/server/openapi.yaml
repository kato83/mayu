openapi: "3.1.0"
info:
  title: Mayu Vulnerability Intelligence API
  description: |
    A unified vulnerability intelligence API that aggregates multiple sources (OSV, NVD, etc.)
    for cross-platform lookup and triage.
  version: "1.0.0"
  license:
    name: MIT
    url: https://github.com/kato83/mayu/blob/main/LICENSE

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/v1/vulnerabilities:
    get:
      operationId: searchVulnerabilities
      summary: Search vulnerabilities
      description: |
        Search for vulnerabilities in the local database.
        At least one search parameter is required unless severity, since, or version is specified.
      tags:
        - vulnerabilities
      parameters:
        - name: id
          in: query
          description: Search by vulnerability ID or alias (e.g., CVE-2024-1234, GO-2024-2687, GHSA-xxxx)
          schema:
            type: string
          example: GO-2024-2687
        - name: package
          in: query
          description: Search by package name (e.g., golang.org/x/crypto)
          schema:
            type: string
          example: golang.org/x/crypto
        - name: ecosystem
          in: query
          description: Filter by ecosystem (e.g., Go, PyPI, npm)
          schema:
            type: string
          example: Go
        - name: purl
          in: query
          description: Search by Package URL (e.g., pkg:golang/golang.org/x/crypto)
          schema:
            type: string
          example: "pkg:golang/golang.org/x/crypto"
        - name: severity
          in: query
          description: Filter by CVSS severity level
          schema:
            type: string
            enum: [critical, high, medium, low, none, unknown]
        - name: since
          in: query
          description: Filter by modified date (YYYY-MM-DD or RFC3339)
          schema:
            type: string
            format: date
          example: "2024-01-01"
        - name: version
          in: query
          description: Filter by affected version
          schema:
            type: string
          example: "0.17.0"
        - name: limit
          in: query
          description: Maximum number of results (1-1000)
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 20
        - name: offset
          in: query
          description: Offset for pagination (legacy, used when cursor is not provided)
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: cursor
          in: query
          description: |
            Opaque cursor for keyset-based pagination. When provided, takes precedence
            over offset. Obtain this value from the `next_cursor` field of the previous response.
          schema:
            type: string
          example: "djF8MjAyNC0wNi0wMlQwMDowMDowMFp8R08tMjAyNC0yNjg4"
        - name: fields
          in: query
          description: Comma-separated list of fields to include in lightweight responses (id, summary, modified, severity, ecosystem)
          schema:
            type: string
          example: "id,summary,modified,severity,ecosystem"
      responses:
        "200":
          description: Successful search response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/vulnerabilities/{id}:
    get:
      operationId: getVulnerability
      summary: Get a vulnerability by ID
      description: Retrieve a single vulnerability by its OSV ID.
      tags:
        - vulnerabilities
      parameters:
        - name: id
          in: path
          required: true
          description: Vulnerability ID (e.g., GO-2024-2687, CVE-2024-1234)
          schema:
            type: string
          example: GO-2024-2687
        - name: detail
          in: query
          description: If "true", return enriched vulnerability data from all sources (NVD, MITRE, EPSS, KEV, LEV)
          schema:
            type: string
            enum: ["true"]
      responses:
        "200":
          description: Vulnerability found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Vulnerability"
                  - $ref: "#/components/schemas/VulnerabilityDetail"
        "404":
          description: Vulnerability not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/ecosystems:
    get:
      operationId: listEcosystems
      summary: List known ecosystems
      description: |
        Returns all known OSV ecosystem names sorted alphabetically.
        This list is populated from ingested OSV data.
      tags:
        - ecosystems
      responses:
        "200":
          description: List of ecosystem names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EcosystemsResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/ingest/jobs:
    get:
      operationId: listIngestJobs
      summary: List recent ingest jobs
      description: |
        Returns a list of recent ingest job executions ordered by start time (newest first).
        Each job includes status, counts, and timing information but not individual failure details.
      tags:
        - ingest
      parameters:
        - name: limit
          in: query
          description: Maximum number of jobs to return (1-100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: List of ingest jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestJobsListResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/ingest/jobs/{id}:
    get:
      operationId: getIngestJob
      summary: Get ingest job detail
      description: |
        Retrieves a single ingest job by ID, including the full list of individual
        failure records (if any). Use this to inspect why specific vulnerabilities
        failed during import.
      tags:
        - ingest
      parameters:
        - name: id
          in: path
          required: true
          description: Ingest job ID
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        "200":
          description: Ingest job detail with failures
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestJobDetailResponse"
        "400":
          description: Invalid job ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Ingest job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/ingest/jobs/{id}/stream:
    get:
      operationId: streamIngestJobProgress
      summary: Stream ingest job progress via SSE
      description: |
        Streams real-time progress events for an ingest job via Server-Sent Events (SSE).

        Supports late-joining: if the job is still running, all events from the beginning
        are replayed, then new events are streamed in real-time. If the job has already
        finished, a single final status event is sent and the stream closes.

        The stream ends when the job completes (phase `done` or `error`).
        Disconnecting from this stream does NOT cancel the server-side ingest job.
      tags:
        - ingest
      parameters:
        - name: id
          in: path
          required: true
          description: Ingest job ID (from POST /api/v1/ingest response)
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        "200":
          description: |
            SSE stream of IngestEvent objects. Each event is prefixed with `data: `
            and separated by double newlines.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/IngestEvent"
        "400":
          description: Invalid job ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Ingest job not found (no active runner and not in DB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/ingest:
    post:
      operationId: startIngest
      summary: Start a data ingest job
      description: |
        Triggers a vulnerability data ingestion operation in the background.
        Returns immediately with the job ID. Only one ingest job can run at a time.

        The ingest runs server-side in a goroutine and is not affected by client
        disconnection. Use `GET /api/v1/ingest/jobs/{id}/stream` to receive
        real-time progress events via SSE.

        **Security:** This endpoint does not execute shell commands. All operations
        call Go functions directly with strict input validation (allowlist-based type,
        regex-validated parameters).
      tags:
        - ingest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "202":
          description: |
            Ingest job accepted and started in the background.
            Use the returned `job_id` to stream progress or query status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestStartResponse"
        "400":
          description: Invalid request parameters (bad type, missing ecosystem, invalid repo format, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: An ingest job is already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Ingest not available (fetcher not configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns the health status of the API server.
      tags:
        - system
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  schemas:
    SearchResponse:
      type: object
      required:
        - vulnerabilities
        - total
        - limit
        - offset
      properties:
        vulnerabilities:
          type: array
          description: |
            Array of vulnerability entries. Each element is raw OSV JSON
            preserved from the original source, so additional fields beyond
            the Vulnerability schema may be present.
          items:
            $ref: "#/components/schemas/Vulnerability"
        total:
          type: integer
          description: Total number of matching vulnerabilities
          example: 42
        limit:
          type: integer
          description: Limit used in the query
          example: 20
        offset:
          type: integer
          description: Offset used in the query (legacy)
          example: 0
        next_cursor:
          type: string
          description: |
            Opaque cursor for fetching the next page. Pass this value as the
            `cursor` query parameter to retrieve subsequent results. Empty or
            absent when there are no more results.
          example: "djF8MjAyNC0wNi0wMlQwMDowMDowMFp8R08tMjAyNC0yNjg4"

    Vulnerability:
      type: object
      description: OSV Schema v1.8.0 vulnerability entry (raw JSON preserved from source)
      required:
        - id
        - modified
      properties:
        schema_version:
          type: string
          example: "1.6.0"
        id:
          type: string
          example: GO-2024-2687
        modified:
          type: string
          format: date-time
        published:
          type: string
          format: date-time
        withdrawn:
          type: string
          format: date-time
        aliases:
          type: array
          items:
            type: string
          example: ["CVE-2024-24790"]
        related:
          type: array
          items:
            type: string
        summary:
          type: string
          example: "Vulnerability in net/netip"
        details:
          type: string
        severity:
          type: array
          items:
            $ref: "#/components/schemas/Severity"
        affected:
          type: array
          items:
            $ref: "#/components/schemas/Affected"
        references:
          type: array
          items:
            $ref: "#/components/schemas/Reference"
        credits:
          type: array
          items:
            $ref: "#/components/schemas/Credit"
        database_specific:
          type: object
          additionalProperties: true

    Severity:
      type: object
      required:
        - type
        - score
      properties:
        type:
          type: string
          enum: [CVSS_V2, CVSS_V3, CVSS_V4]
        score:
          type: string
          description: |
            CVSS vector string (e.g., "CVSS:3.1/AV:N/AC:L/...") in full detail responses,
            or a severity level label (CRITICAL, HIGH, MEDIUM, LOW, NONE) in lightweight
            list responses (when fields parameter is used).
          example: "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
        source:
          type: string

    Affected:
      type: object
      properties:
        package:
          $ref: "#/components/schemas/Package"
        severity:
          type: array
          items:
            $ref: "#/components/schemas/Severity"
        ranges:
          type: array
          items:
            $ref: "#/components/schemas/Range"
        versions:
          type: array
          items:
            type: string
        ecosystem_specific:
          type: object
          additionalProperties: true
        database_specific:
          type: object
          additionalProperties: true

    Package:
      type: object
      required:
        - ecosystem
        - name
      properties:
        ecosystem:
          type: string
          example: Go
        name:
          type: string
          example: golang.org/x/crypto
        purl:
          type: string
          example: "pkg:golang/golang.org/x/crypto"

    Range:
      type: object
      required:
        - type
        - events
      properties:
        type:
          type: string
          enum: [GIT, SEMVER, ECOSYSTEM]
        repo:
          type: string
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        database_specific:
          type: object
          additionalProperties: true

    Event:
      type: object
      properties:
        introduced:
          type: string
        fixed:
          type: string
        last_affected:
          type: string
        limit:
          type: string

    Reference:
      type: object
      required:
        - type
        - url
      properties:
        type:
          type: string
          enum: [ADVISORY, ARTICLE, DETECTION, DISCUSSION, REPORT, FIX, INTRODUCED, GIT, PACKAGE, EVIDENCE, WEB]
        url:
          type: string
          format: uri

    Credit:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        contact:
          type: array
          items:
            type: string
        type:
          type: string
          enum: [FINDER, REPORTER, ANALYST, COORDINATOR, REMEDIATION_DEVELOPER, REMEDIATION_REVIEWER, REMEDIATION_VERIFIER, TOOL, SPONSOR, OTHER]

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
          example: "invalid severity parameter"

    VulnerabilityDetail:
      type: object
      description: Enriched vulnerability detail combining OSV, NVD, MITRE, EPSS, KEV, and LEV data.
      required:
        - id
        - modified
      properties:
        id:
          type: string
        modified:
          type: string
          format: date-time
        published:
          type: string
          format: date-time
        withdrawn:
          type: string
          format: date-time
        aliases:
          type: array
          items:
            type: string
        summary:
          type: string
        details:
          type: string
        severity:
          type: array
          items:
            $ref: "#/components/schemas/Severity"
        severity_worst:
          type: string
          description: Normalized worst severity level from vulnerability_summary (CRITICAL, HIGH, MEDIUM, LOW, NONE)
          enum: [CRITICAL, HIGH, MEDIUM, LOW, NONE]
        severity_best:
          type: string
          description: Normalized best severity level from vulnerability_summary (CRITICAL, HIGH, MEDIUM, LOW, NONE)
          enum: [CRITICAL, HIGH, MEDIUM, LOW, NONE]
        affected:
          type: array
          items:
            $ref: "#/components/schemas/Affected"
        references:
          type: array
          items:
            $ref: "#/components/schemas/Reference"
        credits:
          type: array
          items:
            $ref: "#/components/schemas/Credit"
        nvd:
          type: object
          description: NVD enrichment data
        mitre:
          type: object
          description: MITRE CVE Record enrichment data
        epss:
          type: object
          description: EPSS score data
          properties:
            epss:
              type: number
              format: double
            percentile:
              type: number
              format: double
            score_date:
              type: string
              format: date
        kev:
          type: object
          description: CISA KEV catalog data
        lev:
          type: object
          description: LEV (Likely Exploited Vulnerabilities) computed score
          properties:
            lev:
              type: number
              format: double
            in_kev:
              type: boolean
            epss_score_count:
              type: integer
            first_epss_date:
              type: string
              format: date
            last_epss_date:
              type: string
              format: date
            computed_at:
              type: string
              format: date-time

    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: dev

    EcosystemsResponse:
      type: object
      required:
        - ecosystems
      properties:
        ecosystems:
          type: array
          description: Sorted list of all known OSV ecosystem names
          items:
            type: string
          example: ["Go", "Maven", "PyPI", "crates.io", "npm"]

    IngestRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          description: |
            The type of ingest operation to perform. Must be one of the allowed values.
          enum:
            - ecosystem
            - ecosystem_update
            - all
            - all_bulk
            - nvd
            - nvd_update
            - nvd_converted
            - mitre
            - mitre_update
            - epss
            - epss_update
            - epss_backfill
            - kev
            - kev_update
            - debian
            - ghsa
          example: ecosystem
        ecosystem:
          type: string
          description: |
            Ecosystem name (required when type is `ecosystem` or `ecosystem_update`).
            Must match `^[A-Za-z0-9.:\-]+$` and be a known ecosystem.
          example: Go
        repo:
          type: string
          description: |
            GitHub repository in `owner/repo` format (required when type is `ghsa`).
            Must match `^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$`.
          example: WordPress/wordpress-develop
        from:
          type: string
          format: date
          description: |
            Start date for EPSS backfill (YYYY-MM-DD). Optional for type `epss_backfill`.
            Defaults to 2023-03-07 (EPSS v3 start date).
          example: "2024-01-01"
        to:
          type: string
          format: date
          description: |
            End date for EPSS backfill (YYYY-MM-DD). Optional for type `epss_backfill`.
            Defaults to today.
          example: "2025-07-19"

    IngestJobsListResponse:
      type: object
      required:
        - jobs
      properties:
        jobs:
          type: array
          description: List of ingest jobs ordered by start time (newest first)
          items:
            $ref: "#/components/schemas/IngestJob"

    IngestJob:
      type: object
      required:
        - id
        - source
        - command_args
        - started_at
        - status
      properties:
        id:
          type: integer
          format: int64
          example: 1
        source:
          type: string
          description: The data source for this ingest job (e.g., osv, nvd, mitre, epss, kev, ghsa)
          example: osv
        command_args:
          type: object
          additionalProperties: true
          description: The arguments used to initiate this job
          example: {"ecosystem": "Go"}
        started_at:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        finished_at:
          type: string
          format: date-time
          nullable: true
          example: "2024-01-01T00:01:00Z"
        status:
          type: string
          description: Current status of the job
          enum: [running, success, failed, partial]
          example: success
        total_count:
          type: integer
          nullable: true
          description: Total number of items processed
          example: 1000
        success_count:
          type: integer
          nullable: true
          description: Number of items successfully processed
          example: 999
        failure_count:
          type: integer
          nullable: true
          description: Number of items that failed
          example: 1

    IngestJobDetailResponse:
      type: object
      required:
        - id
        - source
        - command_args
        - started_at
        - status
        - failures
      properties:
        id:
          type: integer
          format: int64
          example: 1
        source:
          type: string
          example: osv
        command_args:
          type: object
          additionalProperties: true
          example: {"ecosystem": "Go"}
        started_at:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        finished_at:
          type: string
          format: date-time
          nullable: true
          example: "2024-01-01T00:01:00Z"
        status:
          type: string
          enum: [running, success, failed, partial]
          example: partial
        total_count:
          type: integer
          nullable: true
          example: 1000
        success_count:
          type: integer
          nullable: true
          example: 999
        failure_count:
          type: integer
          nullable: true
          example: 1
        error_message:
          type: string
          nullable: true
          description: Overall error message if the job failed
        error_stack:
          type: string
          nullable: true
          description: Stack trace if the job failed
        failures:
          type: array
          description: List of individual item failures during the job
          items:
            $ref: "#/components/schemas/IngestFailure"

    IngestFailure:
      type: object
      required:
        - id
        - vuln_id
        - error_type
        - failed_at
      properties:
        id:
          type: integer
          format: int64
          example: 1
        vuln_id:
          type: string
          description: The vulnerability ID that failed to process
          example: CVE-2024-1234
        error_type:
          type: string
          description: Category of the error
          enum: [parse_error, store_error, fetch_error]
          example: parse_error
        error_message:
          type: string
          nullable: true
          description: Human-readable error description
          example: "invalid JSON"
        error_stack:
          type: string
          nullable: true
          description: Stack trace for debugging
        failed_at:
          type: string
          format: date-time
          example: "2024-01-01T00:00:30Z"

    IngestEvent:
      type: object
      description: |
        A single SSE progress event emitted during an ingest operation.
        The stream ends when phase is `done` (success) or `error` (failure).
      required:
        - phase
      properties:
        phase:
          type: string
          description: Current phase of the ingest operation
          enum: [download, parse, store, summary, done, error]
        current:
          type: integer
          description: Number of items processed so far in the current phase
          example: 150
        total:
          type: integer
          description: Total number of items expected in the current phase (0 if unknown)
          example: 500
        message:
          type: string
          description: Human-readable status message
          example: "Downloading Go/all.zip..."

    IngestStartResponse:
      type: object
      description: Immediate response from POST /api/v1/ingest with the background job ID.
      required:
        - job_id
        - status
      properties:
        job_id:
          type: integer
          format: int64
          description: The ID of the started ingest job. Use this to stream progress.
          example: 42
        status:
          type: string
          description: Initial status of the job (always "running")
          example: running
