openapi: "3.1.0"
info:
  title: Mayu Vulnerability Intelligence API
  description: |
    A unified vulnerability intelligence API that aggregates multiple sources (OSV, NVD, etc.)
    for cross-platform lookup and triage.
  version: "1.0.0"
  license:
    name: MIT
    url: https://github.com/kato83/mayu/blob/main/LICENSE

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/v1/vulnerabilities:
    get:
      operationId: searchVulnerabilities
      summary: Search vulnerabilities
      description: |
        Search for vulnerabilities in the local database.
        At least one search parameter is required unless severity, since, or version is specified.
      tags:
        - vulnerabilities
      parameters:
        - name: id
          in: query
          description: Search by vulnerability ID (e.g., CVE-2024-1234, GO-2024-2687)
          schema:
            type: string
          example: GO-2024-2687
        - name: package
          in: query
          description: Search by package name (e.g., golang.org/x/crypto)
          schema:
            type: string
          example: golang.org/x/crypto
        - name: ecosystem
          in: query
          description: Filter by ecosystem (e.g., Go, PyPI, npm)
          schema:
            type: string
          example: Go
        - name: alias
          in: query
          description: Search by alias (e.g., CVE-2024-24790)
          schema:
            type: string
          example: CVE-2024-24790
        - name: purl
          in: query
          description: Search by Package URL (e.g., pkg:golang/golang.org/x/crypto)
          schema:
            type: string
          example: "pkg:golang/golang.org/x/crypto"
        - name: severity
          in: query
          description: Filter by CVSS severity level
          schema:
            type: string
            enum: [critical, high, medium, low, none]
        - name: since
          in: query
          description: Filter by modified date (YYYY-MM-DD or RFC3339)
          schema:
            type: string
            format: date
          example: "2024-01-01"
        - name: version
          in: query
          description: Filter by affected version
          schema:
            type: string
          example: "0.17.0"
        - name: limit
          in: query
          description: Maximum number of results (1-1000)
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 20
        - name: offset
          in: query
          description: Offset for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Successful search response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/vulnerabilities/{id}:
    get:
      operationId: getVulnerability
      summary: Get a vulnerability by ID
      description: Retrieve a single vulnerability by its OSV ID.
      tags:
        - vulnerabilities
      parameters:
        - name: id
          in: path
          required: true
          description: Vulnerability ID (e.g., GO-2024-2687, CVE-2024-1234)
          schema:
            type: string
          example: GO-2024-2687
      responses:
        "200":
          description: Vulnerability found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vulnerability"
        "404":
          description: Vulnerability not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns the health status of the API server.
      tags:
        - system
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  schemas:
    SearchResponse:
      type: object
      required:
        - vulnerabilities
        - total
        - limit
        - offset
      properties:
        vulnerabilities:
          type: array
          description: |
            Array of vulnerability entries. Each element is raw OSV JSON
            preserved from the original source, so additional fields beyond
            the Vulnerability schema may be present.
          items:
            $ref: "#/components/schemas/Vulnerability"
        total:
          type: integer
          description: Total number of matching vulnerabilities
          example: 42
        limit:
          type: integer
          description: Limit used in the query
          example: 20
        offset:
          type: integer
          description: Offset used in the query
          example: 0

    Vulnerability:
      type: object
      description: OSV Schema v1.8.0 vulnerability entry (raw JSON preserved from source)
      required:
        - id
        - modified
      properties:
        schema_version:
          type: string
          example: "1.6.0"
        id:
          type: string
          example: GO-2024-2687
        modified:
          type: string
          format: date-time
        published:
          type: string
          format: date-time
        withdrawn:
          type: string
          format: date-time
        aliases:
          type: array
          items:
            type: string
          example: ["CVE-2024-24790"]
        related:
          type: array
          items:
            type: string
        summary:
          type: string
          example: "Vulnerability in net/netip"
        details:
          type: string
        severity:
          type: array
          items:
            $ref: "#/components/schemas/Severity"
        affected:
          type: array
          items:
            $ref: "#/components/schemas/Affected"
        references:
          type: array
          items:
            $ref: "#/components/schemas/Reference"
        credits:
          type: array
          items:
            $ref: "#/components/schemas/Credit"
        database_specific:
          type: object
          additionalProperties: true

    Severity:
      type: object
      required:
        - type
        - score
      properties:
        type:
          type: string
          enum: [CVSS_V2, CVSS_V3, CVSS_V4]
        score:
          type: string
          example: "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
        source:
          type: string

    Affected:
      type: object
      properties:
        package:
          $ref: "#/components/schemas/Package"
        severity:
          type: array
          items:
            $ref: "#/components/schemas/Severity"
        ranges:
          type: array
          items:
            $ref: "#/components/schemas/Range"
        versions:
          type: array
          items:
            type: string
        ecosystem_specific:
          type: object
          additionalProperties: true
        database_specific:
          type: object
          additionalProperties: true

    Package:
      type: object
      required:
        - ecosystem
        - name
      properties:
        ecosystem:
          type: string
          example: Go
        name:
          type: string
          example: golang.org/x/crypto
        purl:
          type: string
          example: "pkg:golang/golang.org/x/crypto"

    Range:
      type: object
      required:
        - type
        - events
      properties:
        type:
          type: string
          enum: [GIT, SEMVER, ECOSYSTEM]
        repo:
          type: string
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        database_specific:
          type: object
          additionalProperties: true

    Event:
      type: object
      properties:
        introduced:
          type: string
        fixed:
          type: string
        last_affected:
          type: string
        limit:
          type: string

    Reference:
      type: object
      required:
        - type
        - url
      properties:
        type:
          type: string
          enum: [ADVISORY, ARTICLE, DETECTION, DISCUSSION, REPORT, FIX, INTRODUCED, GIT, PACKAGE, EVIDENCE, WEB]
        url:
          type: string
          format: uri

    Credit:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        contact:
          type: array
          items:
            type: string
        type:
          type: string
          enum: [FINDER, REPORTER, ANALYST, COORDINATOR, REMEDIATION_DEVELOPER, REMEDIATION_REVIEWER, REMEDIATION_VERIFIER, TOOL, SPONSOR, OTHER]

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
          example: "invalid severity parameter"

    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: dev
