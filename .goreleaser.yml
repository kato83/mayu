version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mayu
    main: ./cmd/mayu
    binary: mayu
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=uiembed
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  github:
    owner: kato83
    name: mayu
  draft: false
  prerelease: auto
